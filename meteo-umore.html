<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Umore</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

body {
  font-family: 'DM Sans', sans-serif;
  background: #F7F5F2;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.wrap {
  width: 100%;
  max-width: 360px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid rgba(0,0,0,0.08);
}

h1 {
  font-size: 14px;
  margin-bottom: 4px;
}

.subtitle {
  font-size: 11px;
  color: #888;
  margin-bottom: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 8px;
}

button.icon {
  font-size: 24px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  background: #f7f5f2;
  cursor: pointer;
}

button.icon.selected {
  border-color: green;
  background: #EAF3DE;
}

.status {
  font-size: 11px;
  text-align: center;
  margin-top: 10px;
  color: #3B6D11;
}

.toggle {
  width: 100%;
  background: none;
  border: none;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

.ranking-body {
  max-height: 0;
  overflow: hidden;
  transition: 0.3s;
}

.ranking-body.open {
  max-height: 400px;
}

.rank {
  font-size: 12px;
  margin: 6px 0;
}

</style>
</head>

<body>

<div class="wrap">

<div class="card">
  <h1>Che meteo ti senti oggi?</h1>
  <div class="subtitle" id="date"></div>

  <div class="grid" id="grid"></div>

  <div class="status" id="status"></div>
</div>

<div class="card">
  <button class="toggle" onclick="toggleRanking()">
    <span>Classifica</span>
    <span id="arrow">▼</span>
  </button>

  <div class="ranking-body" id="rankingBody">
    <div id="ranking">Caricamento...</div>
  </div>
</div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx2eb0Rxsw8caWtrhH7Z3nG2btmYt2JrFnQmfU9qUdpE6kPxYuxC8m_BNe-iWSL8hqH/exec";

const ICONS = [
  { emoji: "☀️", label: "Soleggiato" },
  { emoji: "🌤️", label: "Poco nuvoloso" },
  { emoji: "⛅", label: "Nuvoloso" },
  { emoji: "🌧️", label: "Pioggia" },
  { emoji: "⛈️", label: "Temporale" },
  { emoji: "🌨️", label: "Neve" },
  { emoji: "🌪️", label: "Tornado" }
];

function getUserId() {
  let id = localStorage.getItem("meteo_uid");
  if (!id) {
    id = Math.random().toString(36).slice(2);
    localStorage.setItem("meteo_uid", id);
  }
  return id;
}

function todayStr() {
  return new Date().toISOString().split("T")[0];
}

const grid = document.getElementById("grid");
const status = document.getElementById("status");

function render(selected) {
  grid.innerHTML = "";

  ICONS.forEach(icon => {
    const btn = document.createElement("button");
    btn.className = "icon";
    btn.textContent = icon.emoji;

    if (selected === icon.emoji) {
      btn.classList.add("selected");
    }

    btn.onclick = () => vote(icon);

    grid.appendChild(btn);
  });
}

async function vote(icon) {
  render(icon.emoji);

  status.innerText = "Salvataggio...";

  const params = new URLSearchParams({
    action: "vote",
    icona: icon.emoji,
    label: icon.label,
    user_id: getUserId()
  });

  await fetch(SCRIPT_URL + "?" + params.toString());

  status.innerText = "Salvato!";
  loadRanking();
}

async function loadRanking() {
  const res = await fetch(SCRIPT_URL + "?action=ranking&t=" + Date.now());
  const json = await res.json();

  const data = json.counts.week || {};

  const entries = Object.entries(data)
    .map(([k, v]) => {
      const [emoji, label] = k.split("||");
      return { emoji, label, count: v };
    })
    .sort((a, b) => b.count - a.count);

  const el = document.getElementById("ranking");

  if (entries.length === 0) {
    el.innerHTML = "Nessun voto";
    return;
  }

  el.innerHTML = entries.map(e =>
    `<div class="rank">${e.emoji} ${e.label} — ${e.count}</div>`
  ).join("");
}

function toggleRanking() {
  const body = document.getElementById("rankingBody");
  const arrow = document.getElementById("arrow");

  const open = body.classList.toggle("open");
  arrow.innerText = open ? "▲" : "▼";
}

document.getElementById("date").innerText =
  new Date().toLocaleDateString("it-IT", { weekday: "long", day: "numeric", month: "long" });

render();
loadRanking();
</script>

</body>
</html>
