<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Umore</title>

<style>
body {
  font-family: sans-serif;
  background: #f7f5f2;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 18px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  max-width: 300px;
  margin: 20px auto;
}

button {
  font-size: 24px;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #ccc;
  cursor: pointer;
}

button:hover {
  background: #eee;
}

.selected {
  border: 2px solid green;
  background: #eaf3de;
}

#ranking {
  margin-top: 30px;
  text-align: left;
  max-width: 300px;
  margin-left: auto;
  margin-right: auto;
}
</style>

</head>
<body>

<h1>Che meteo ti senti oggi?</h1>

<div class="grid" id="grid"></div>

<div id="status"></div>

<h2>Classifica settimana</h2>
<div id="ranking">Caricamento...</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx2eb0Rxsw8caWtrhH7Z3nG2btmYt2JrFnQmfU9qUdpE6kPxYuxC8m_BNe-iWSL8hqH/exec";

const ICONS = [
  { emoji: "☀️", label: "Soleggiato" },
  { emoji: "🌤️", label: "Poco nuvoloso" },
  { emoji: "⛅", label: "Nuvoloso" },
  { emoji: "🌧️", label: "Pioggia" },
  { emoji: "⛈️", label: "Temporale" },
  { emoji: "🌨️", label: "Neve" },
  { emoji: "🌪️", label: "Tornado" }
];

function getUserId() {
  let id = localStorage.getItem("meteo_uid");
  if (!id) {
    id = Math.random().toString(36).slice(2);
    localStorage.setItem("meteo_uid", id);
  }
  return id;
}

function todayStr() {
  return new Date().toISOString().split("T")[0];
}

function getSavedVote() {
  const saved = localStorage.getItem("meteo_vote");
  if (!saved) return null;

  const obj = JSON.parse(saved);
  if (obj.date === todayStr()) return obj;
  return null;
}

function saveVoteLocal(emoji) {
  localStorage.setItem("meteo_vote", JSON.stringify({
    date: todayStr(),
    emoji
  }));
}

const grid = document.getElementById("grid");
const status = document.getElementById("status");

function render(selected) {
  grid.innerHTML = "";

  ICONS.forEach(icon => {
    const btn = document.createElement("button");
    btn.textContent = icon.emoji;

    if (selected === icon.emoji) {
      btn.classList.add("selected");
    }

    btn.onclick = () => vote(icon);

    grid.appendChild(btn);
  });
}

async function vote(icon) {
  render(icon.emoji);
  saveVoteLocal(icon.emoji);

  status.innerText = "Salvataggio...";

  const params = new URLSearchParams({
    action: "vote",
    icona: icon.emoji,
    label: icon.label,
    user_id: getUserId()
  });

  await fetch(SCRIPT_URL + "?" + params.toString());

  status.innerText = "Salvato!";
  loadRanking();
}

async function loadRanking() {
  const res = await fetch(SCRIPT_URL + "?action=ranking&t=" + Date.now());
  const json = await res.json();

  const data = json.counts.week || {};

  const entries = Object.entries(data)
    .map(([k, v]) => {
      const [emoji, label] = k.split("||");
      return { emoji, label, count: v };
    })
    .sort((a, b) => b.count - a.count);

  const el = document.getElementById("ranking");

  if (entries.length === 0) {
    el.innerHTML = "Nessun voto";
    return;
  }

  el.innerHTML = entries.map(e =>
    `<div>${e.emoji} ${e.label} — ${e.count}</div>`
  ).join("");
}

const saved = getSavedVote();
render(saved ? saved.emoji : null);

loadRanking();
</script>

</body>
</html>
